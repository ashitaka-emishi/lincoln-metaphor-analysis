project:
  type: website
  output-dir: _site
  render:
    - "**/*.qmd"
    - "**/*.md"
    - "!SCAFFOLD.md"
    - "!docs/PROMPT.md"
    - "!docs/QUARTO.md"
    - "!docs/agents.md"
    - "!README.md"
    - "!reports/**"
    - "!data/**"
    - "!scaffolds/**"

bibliography: references.bib

website:
  title: "Lincoln Metaphor Analysis"
  description: "A structured study of metaphor, obligation, agency, and reconciliation in Lincoln's rhetoric, 1838–1865"
  draft-mode: visible

  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Overview
      - href: synthesis/findings.md
        text: Findings
      - href: analysis_overview.md
        text: Analysis
      - href: methods_summary.md
        text: Method
      - href: corpus_index.qmd
        text: Corpus
    right:
      - icon: github
        href: https://github.com/ashitaka-emishi/lincoln-metaphor-analysis
        aria-label: View project on GitHub

  sidebar:
    style: docked
    search: true
    contents:
      - href: index.qmd
        text: Overview
      - href: synthesis/findings.md
        text: Principal Findings
      - href: synthesis/final_conclusions.md
        text: Conclusions
      - href: analysis_overview.md
        text: Analysis Guide
      - href: analysis/systematic_absence.md
        text: Systematic Absence
      - href: analysis/diachronic_map.md
        text: Diachronic Map
      - href: methods_summary.md
        text: Method Summary
      - href: docs/methodology/research-design.md
        text: Research Design
      - href: corpus_index.qmd
        text: Corpus
      - href: data_reproducibility.md
        text: Data / Reproducibility
      - href: research_appendix.md
        text: Research Appendix

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    toc-depth: 2
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    include-after-body:
      text: |
        <script>
        document.addEventListener("DOMContentLoaded", () => {
          if (document.getElementById("quarto-draft-alert")) {
            document.body.classList.add("draft-page");
          }
          const path = window.location.pathname.replace(/\/$/, "/index.html");
          const sections = [
            { text: "Overview", match: p => /\/index\.html$/.test(p) || /\/executive_summary\.html$/.test(p) },
            { text: "Findings", match: p => p.includes("/synthesis/") || p.includes("/comparison/koenigsberg_comparison.html") },
            { text: "Analysis", match: p => /\/analysis_overview\.html$/.test(p) || p.includes("/analysis/") },
            { text: "Method", match: p =>
              /\/methods_summary\.html$/.test(p) ||
              /\/data_reproducibility\.html$/.test(p) ||
              /\/research_appendix\.html$/.test(p) ||
              p.includes('/docs/methodology/') ||
              p.includes('/docs/upgrade.html') ||
              p.includes('/docs/DECISIONS.html') ||
              p.includes("/skills/") ||
              p.includes("/comparison/theoretical_framework.html")
            },
            { text: "Corpus", match: p => /\/corpus_index\.html$/.test(p) || p.includes("/corpus/") }
          ];
          const active = sections.find(section => section.match(path));
          if (!active) return;
          document.querySelectorAll(".navbar-nav .nav-link").forEach(link => {
            if (link.textContent.trim() === active.text) {
              link.classList.add("section-active");
            }
          });
        });
        </script>
